replicaCount: 2

image:
  repository: REPLACE_WITH_ECR_REPOSITORY
  tag: REPLACE_WITH_IMAGE_TAG
  pullPolicy: Always

# Use a digestable CI tag like `${{ github.sha }}` or a build number.
# Avoid `latest` when the ECR repo is immutable.

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 250m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 70
  memoryUtilization: 80

env:
  NODE_ENV: production
  PORT: "3000"

  DB_HOST: "REPLACE_WITH_RDS_ENDPOINT"
  DB_PORT: "5432"
  DB_NAME: "letstype"
  DB_USER: "postgres"
